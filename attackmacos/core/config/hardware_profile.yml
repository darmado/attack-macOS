procedure_name: hardware_profile
tactic: Discovery
ttp_id: T1082
guid: 0f714f73-cf87-4c82-a4da-ce74104bae2b
intent: Reports system hardware and software configuration. Sourced from LOOBins;
  confirm MITRE mapping for each enabled option.
author: '@darmado | https://x.com/darmad0'
created: '2023-07-12'
updated: '2026-05-03'
version: 1.0.6
platform:
- darwin
detection:
- ioc: System Information Discovery Using System_Profiler
  analysis: https://github.com/SigmaHQ/sigma/blob/master/rules/macos/process_creation/proc_creation_macos_system_profiler_discovery.yml
- ioc: 'Jamf Protect: Detect system_profiler activity that gathers system information'
  analysis: https://github.com/jamf/jamfprotect/blob/main/custom_analytic_detections/system_profiler_activity
resources:
- link: https://www.loobins.io/
  description: LOOBins — Living Off The Orchard macOS binaries
- link: https://attack.mitre.org/techniques/T1082/
  description: MITRE ATT&CK — T1082
- link: ''
  description: ''
- link: https://macosbin.com/bin/system_profiler
  description: macOS/binaries/system_profiler
- link: https://ss64.com/osx/system_profiler.html
  description: system_profiler man page
acknowledgement:
- person: ''
  handle: ''
procedure:
  arguments:
  - option: --listing-the-available-datatypes
    description: List all available sub-systems to get information from.
    execute_function:
    - execute_listing_available_datatypes
  - option: --print-hardware-information
    description: Prints an overview of the hardware of the current machine, including
      its model name and serial numbe
    execute_function:
    - execute_print_hardware_information
  - option: --print-software-information
    description: Prints an overview of the software of the current machine, including
      the exact macOS version number.
    execute_function:
    - execute_print_software_information
  - option: --print-the-information-of-developer-tools
    description: Prints the currently active version of the Xcode developer tools
      and SDK.
    execute_function:
    - execute_print_information_developer_tools
  - option: --print-power-and-battery-information
    description: Prints power and battery information, including the current AC wattage
      and battery cycle count.
    execute_function:
    - execute_print_power_battery_information
  global_variable:
  - name: CMD_SYSTEM_PROFILER
    type: string
    default_value: /usr/sbin/system_profiler
  functions:
  - name: execute_listing_available_datatypes
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_listing_available_datatypes() {\n    local result\n    result=$(system_profiler\
      \ -listDataTypes 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return\
      \ 0\n}"
  - name: execute_print_hardware_information
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_print_hardware_information() {\n    local result\n    result=$(system_profiler\
      \ SPHardwareDataType 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n \
      \   return 0\n}"
  - name: execute_print_software_information
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_print_software_information() {\n    local result\n    result=$(system_profiler\
      \ SPSoftwareDataType 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n \
      \   return 0\n}"
  - name: execute_print_information_developer_tools
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_print_information_developer_tools() {\n    local result\n    result=$(system_profiler\
      \ SPDeveloperToolsDataType 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\
      \n    return 0\n}"
  - name: execute_print_power_battery_information
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_print_power_battery_information() {\n    local result\n    result=$(system_profiler\
      \ SPPowerDataType 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return\
      \ 0\n}"
credit: Ethan Nay
