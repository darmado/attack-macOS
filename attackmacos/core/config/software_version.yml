procedure_name: software_version
tactic: Discovery
ttp_id: T1082
guid: 6d6f4918-c57b-4731-bfdb-21eec453455f
intent: Discover macOS product name, product version, and build via /usr/bin/sw_vers
  (T1082). Procedure name carries scope; flags stay short (see Naming Conventions).
author: Eliott (@Koyiott)
created: '2023-09-11'
updated: '2026-05-03'
version: 1.1.3
platform:
- darwin
detection: []
resources:
- link: https://www.loobins.io/
  description: "LOOBins \u2014 Living Off The Orchard macOS binaries"
- link: https://attack.mitre.org/techniques/T1082/
  description: "MITRE ATT&CK \u2014 T1082"
- link: ''
  description: ''
- link: https://macosbin.com/bin/sw_vers
  description: macOS/binaries/sw_vers
- link: https://ss64.com/osx/sw_vers.html
  description: sw_vers man page
acknowledgement:
- person: ''
  handle: ''
procedure:
  arguments:
  - option: --full
    description: Full sw_vers output (product name, version, build)
    execute_function:
    - discover_version_full
  - option: --product-version
    description: Product version string only (-productVersion)
    execute_function:
    - discover_product_version
  - option: --product-name
    description: Product marketing name only (-productName)
    execute_function:
    - discover_product_name
  - option: --build-version
    description: Build number only (-buildVersion)
    execute_function:
    - discover_build_version
  global_variable:
  - name: CMD_SW_VERS
    type: string
    default_value: /usr/bin/sw_vers
  functions:
  - name: discover_version_full
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: |
      discover_version_full() {
          local result
          result=$("$CMD_SW_VERS" 2>&1)
          $CMD_PRINTF "RESULT|%s\n" "$result"
          return 0
      }
  - name: discover_product_version
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: |
      discover_product_version() {
          local result
          result=$("$CMD_SW_VERS" -productVersion 2>&1)
          $CMD_PRINTF "RESULT|%s\n" "$result"
          return 0
      }
  - name: discover_product_name
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: |
      discover_product_name() {
          local result
          result=$("$CMD_SW_VERS" -productName 2>&1)
          $CMD_PRINTF "RESULT|%s\n" "$result"
          return 0
      }
  - name: discover_build_version
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: |
      discover_build_version() {
          local result
          result=$("$CMD_SW_VERS" -buildVersion 2>&1)
          $CMD_PRINTF "RESULT|%s\n" "$result"
          return 0
      }
