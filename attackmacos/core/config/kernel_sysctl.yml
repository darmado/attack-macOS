procedure_name: kernel_sysctl
tactic: Discovery
ttp_id: T1082
guid: 5b298565-0832-42a2-a244-00f32635a38a
intent: Get macOS hardware model information. Sourced from LOOBins; confirm MITRE
  mapping for each enabled option.
author: '@darmado | https://x.com/darmad0'
created: '2023-04-20'
updated: '2026-05-03'
version: 1.0.6
platform:
- darwin
detection:
- ioc: 'Jamf Protect: Detect activity related to sysctl in an interactive shell'
  analysis: https://github.com/jamf/jamfprotect/blob/main/custom_analytic_detections/sysctl_activity
resources:
- link: https://www.loobins.io/
  description: LOOBins — Living Off The Orchard macOS binaries
- link: https://attack.mitre.org/techniques/T1082/
  description: MITRE ATT&CK — T1082
- link: ''
  description: ''
- link: https://evasions.checkpoint.com/src/MacOS/macos.html
  description: 'Evasions: macOS'
acknowledgement:
- person: ''
  handle: ''
procedure:
  arguments:
  - option: --use-sysctl-to-gather-macos-hardware-info
    description: sysctl can be used to gather interesting macOS host data, including
      hardware information, memory siz
    execute_function:
    - execute_use_sysctl_gather_macos_hardware_info
  global_variable:
  - name: CMD_SYSCTL
    type: string
    default_value: /usr/sbin/sysctl
  functions:
  - name: execute_use_sysctl_gather_macos_hardware_info
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_use_sysctl_gather_macos_hardware_info() {\n    local result\n \
      \   result=$(sysctl -n hw.model 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\
      \n    return 0\n}"
credit: Cedric Owens (@cedowens)
