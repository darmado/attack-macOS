procedure_name: active_directory_domain
tactic: Discovery
ttp_id: T1087.004
guid: 20c16a8f-b936-4347-a48e-a1e19c309cae
intent: retrieves/changes configuration for Directory Services Active Directory Plugin.
  Sourced from LOOBins; confirm MITRE mapping for each enabled option.
author: Ethan Nay
created: '2023-08-23'
updated: '2026-05-03'
version: 1.0.5
platform:
- darwin
detection: []
resources:
- link: https://www.loobins.io/
  description: "LOOBins \u2014 Living Off The Orchard macOS binaries"
- link: https://attack.mitre.org/techniques/T1087/004/
  description: "MITRE ATT&CK \u2014 T1087.004"
- link: ''
  description: ''
- link: https://macosbin.com/bin/dsconfigad
  description: macOS/binaries/dsconfigad
- link: https://www.unix.com/man-page/osx/8/dsconfigad/
  description: dsconfigad man page
acknowledgement:
- person: ''
  handle: ''
procedure:
  arguments:
  - option: --retrieves-the-active-directory-configuration
    description: Retrieves the Active Directory configuration
    execute_function:
    - execute_retrieves_active_directory_configuration
  - option: --retrieves-the-active-directory-name
    description: Retrieves the Active Directory name
    execute_function:
    - execute_retrieves_active_directory_name
  global_variable:
  - name: CMD_DSCONFIGAD
    type: string
    default_value: /usr/sbin/dsconfigad
  functions:
  - name: execute_retrieves_active_directory_configuration
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_retrieves_active_directory_configuration() {\n    local result\n\
      \    result=$(dsconfigad -show 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\
      \n    return 0\n}"
  - name: execute_retrieves_active_directory_name
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_retrieves_active_directory_name() {\n    local result\n    result=$(dsconfigad\
      \ -show |awk '/Active Directory Domain/{print $NF}' 2>&1)\n    $CMD_PRINTF \"\
      RESULT|%s\\n\" \"$result\"\n    return 0\n}"
