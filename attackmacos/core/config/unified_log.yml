procedure_name: unified_log
tactic: Discovery
ttp_id: T1082
guid: dfbf5f7d-fb0e-4096-91bd-c5b53005a625
intent: Access system log messages from Apple Unified Logging (AUL). Sourced from
  LOOBins; confirm MITRE mapping for each enabled option.
author: '@darmado | https://x.com/darmad0'
created: '2023-06-06'
updated: '2026-05-03'
version: 1.0.6
platform:
- darwin
detection: []
resources:
- link: https://www.loobins.io/
  description: LOOBins — Living Off The Orchard macOS binaries
- link: https://attack.mitre.org/techniques/T1082/
  description: MITRE ATT&CK — T1082
- link: ''
  description: ''
- link: https://shellcromancer.io/posts/living-off-of-macos/
  description: Living off the land in macOS (Daniel Stinson)
acknowledgement:
- person: ''
  handle: ''
procedure:
  arguments:
  - option: --remove-all-log-messages
    description: An attacker can cover up their tracks by removing all log messages
      using the following command. Requ
    execute_function:
    - execute_remove_all_log_messages
  - option: --search-log-messages-for-tokens
    description: 'An attacker can potentially search log messages and review if they
      do contain sensitive information '
    execute_function:
    - execute_search_log_messages_tokens
  global_variable:
  - name: CMD_LOG
    type: string
    default_value: /usr/bin/log
  functions:
  - name: execute_remove_all_log_messages
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_remove_all_log_messages() {\n    local result\n    result=$(log\
      \ erase --all 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return\
      \ 0\n}"
  - name: execute_search_log_messages_tokens
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_search_log_messages_tokens() {\n    local result\n    result=$(log\
      \ show --info --debug --predicate 'eventMessage CONTAINS[d] \"eyJ\"' 2>&1)\n\
      \    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
credit: Brendan Chamberlain (@infosecB)
