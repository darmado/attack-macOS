procedure:
  arguments:
  - option: --network-device-enumeration
    description: 'Use networksetup to display services with corresponding port and
      device in order they are tried for '
    execute_function:
    - execute_network_device_enumeration
  - option: --detect-connected-network-hardware
    description: Use networksetup to detect new network hardware and create a default
      network service on the hardware
    execute_function:
    - execute_detect_connected_network_hardware
  - option: --network-device-enumeration
    description: Use networksetup to list all network interfaces, providing name,
      device name, MAC address.
    execute_function:
    - execute_network_device_enumeration
  - option: --network-device-enumeration
    description: Use networksetup to list all network interface names.
    execute_function:
    - execute_network_device_enumeration
  - option: --dns-server-enumeration
    description: Use networksetup to get configured DNS servers for a specific interface.
    execute_function:
    - execute_dns_server_enumeration
  - option: --enumerate-configured-web-proxy-url-for-an-interface
    description: Displays web proxy auto-configuration information for the specified
      interface.
    execute_function:
    - execute_enumerate_configured_web_proxy_url_interface
  - option: --enumerate-configured-web-proxy-for-an-interface
    description: Displays standard web proxy information for the specified interface.
    execute_function:
    - execute_enumerate_configured_web_proxy_interface
  - option: --set-the-https-web-proxy-for-an-interface
    description: Use networksetup to set the https web proxy for an interface.
    execute_function:
    - execute_set_https_web_proxy_interface
  - option: --set-the-http-web-proxy-for-an-interface
    description: Use networksetup to set the http web proxy for an interface.
    execute_function:
    - execute_set_http_web_proxy_interface
  - option: --set-auto-proxy-url-for-an-interface
    description: Use networksetup to set the proxy URL for an interface.
    execute_function:
    - execute_set_auto_proxy_url_interface
  - option: --enable-auto-proxy-state
    description: Use networksetup to enable the proxy auto-config
    execute_function:
    - execute_enable_auto_proxy_state
  global_variable:
  - name: CMD_NETWORKSETUP
    type: string
    default_value: /usr/sbin/networksetup
  functions:
  - name: execute_network_device_enumeration
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_network_device_enumeration() {\n    local result\n    result=$(networksetup\
      \ -listnetworkserviceorder 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\
      \n    return 0\n}"
  - name: execute_detect_connected_network_hardware
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_detect_connected_network_hardware() {\n    local result\n    result=$(networksetup\
      \ -detectnewhardware 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n \
      \   return 0\n}"
  - name: execute_network_device_enumeration
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_network_device_enumeration() {\n    local result\n    result=$(networksetup\
      \ -listallhardwareports 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n\
      \    return 0\n}"
  - name: execute_network_device_enumeration
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_network_device_enumeration() {\n    local result\n    result=$(networksetup\
      \ -listallnetworkservices 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\
      \n    return 0\n}"
  - name: execute_dns_server_enumeration
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_dns_server_enumeration() {\n    local result\n    result=$(networksetup\
      \ -getdnsservers Wi-Fi 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n\
      \    return 0\n}"
  - name: execute_enumerate_configured_web_proxy_url_interface
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_enumerate_configured_web_proxy_url_interface() {\n    local result\n\
      \    result=$(networksetup -getautoproxyurl \"Thunderbolt Ethernet\" 2>&1)\n\
      \    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
  - name: execute_enumerate_configured_web_proxy_interface
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_enumerate_configured_web_proxy_interface() {\n    local result\n\
      \    result=$(networksetup -getwebproxy \"Wi-Fi\" 2>&1)\n    $CMD_PRINTF \"\
      RESULT|%s\\n\" \"$result\"\n    return 0\n}"
  - name: execute_set_https_web_proxy_interface
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_set_https_web_proxy_interface() {\n    local result\n    result=$(networksetup\
      \ -setsecurewebproxy \"Wi-Fi\" 46.226.108.171 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\\
      n\" \"$result\"\n    return 0\n}"
  - name: execute_set_http_web_proxy_interface
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_set_http_web_proxy_interface() {\n    local result\n    result=$(networksetup\
      \ -setwebproxy \"Wi-Fi\" 46.226.108.171 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\\
      n\" \"$result\"\n    return 0\n}"
  - name: execute_set_auto_proxy_url_interface
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_set_auto_proxy_url_interface() {\n    local result\n    result=$(networksetup\
      \ -setautoproxyurl \"Wi-Fi\" $autoProxyURL 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\\
      n\" \"$result\"\n    return 0\n}"
  - name: execute_enable_auto_proxy_state
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_enable_auto_proxy_state() {\n    local result\n    result=$(networksetup\
      \ -setautoproxystate \"Wi-Fi\" on 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"\
      $result\"\n    return 0\n}"
