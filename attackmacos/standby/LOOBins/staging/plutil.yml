procedure:
  arguments:
  - option: --set-app-to-run-with-dock-icon-hidden
    description: plutil can be used to set the "LSUIElement" attribute to tue which will force the targeted app to ru
    execute_function:
    - execute_set_app_run_dock_icon_hidden
  global_variable:
  - name: CMD_PLUTIL
    type: string
    default_value: /usr/bin/plutil
  functions:
  - name: execute_set_app_run_dock_icon_hidden
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_set_app_run_dock_icon_hidden() {\n    local result\n    result=$(plutil -insert LSUIElement -string \"\
      1\" /Applications/TargetApp.app/Contents/Info.plist 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return\
      \ 0\n}"
