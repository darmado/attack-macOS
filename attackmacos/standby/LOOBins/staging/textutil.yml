- ioc: Command Line Argument Detection (args contain textutil AND (-convert OR -stdin OR pbpaste))
  analysis: n/a
resources:
- link: https://www.loobins.io/
  description: LOOBins — Living Off The Orchard macOS binaries
- link: ''
  description: ''
- link: https://osxdaily.com/tag/textutil/
  description: textutil
acknowledgement:
- person: ''
  handle: ''
procedure:
  arguments:
  - option: --use-the-textutil-to-read-several-files-and-build-a-new-file
    description: A one-liner can load the content of multiple RTF files in a directory, concatenate their contents, a
    execute_function:
    - execute_use_textutil_read_several_files_build_new_file
  - option: --capture-clipboard-content
    description: By leveraging another command line tool, pbpaste, it is possible to write a one-liner which captures
    execute_function:
    - execute_capture_clipboard_content
  global_variable:
  - name: CMD_TEXTUTIL
    type: string
    default_value: /usr/bin/textutil
  functions:
  - name: execute_use_textutil_read_several_files_build_new_file
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_use_textutil_read_several_files_build_new_file() {\n    local result\n    result=$(textutil -convert html\
      \ Quote.doc secondQuote.doc 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
  - name: execute_capture_clipboard_content
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_capture_clipboard_content() {\n    local result\n    result=$(pbpaste | textutil -stdin -info > Clipboard.txt\
      \ 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
