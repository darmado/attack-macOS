procedure_name: sysctl
tactic: Discovery
ttp_id: T9999
guid: $GUID
intent: Get macOS hardware model information.
author: '@darmado | https://x.com/darmad0'
credit: 'LOOBins catalog author: Cedric Owens (@cedowens)'
created: '2023-04-20'
updated: $UPDATED
version: 1.0.0
platform:
- darwin
detection:
- ioc: 'Jamf Protect: Detect activity related to sysctl in an interactive shell'
  analysis: https://github.com/jamf/jamfprotect/blob/main/custom_analytic_detections/sysctl_activity
resources:
- link: https://www.loobins.io/
  description: LOOBins — Living Off The Orchard macOS binaries
- link: ''
  description: ''
- link: https://evasions.checkpoint.com/src/MacOS/macos.html
  description: 'Evasions: macOS'
acknowledgement:
- person: ''
  handle: ''
procedure:
  arguments:
  - option: --use-sysctl-to-gather-macos-hardware-info
    description: sysctl can be used to gather interesting macOS host data, including hardware information, memory siz
    execute_function:
    - execute_use_sysctl_gather_macos_hardware_info
  global_variable:
  - name: CMD_SYSCTL
    type: string
    default_value: /usr/sbin/sysctl
  functions:
  - name: execute_use_sysctl_gather_macos_hardware_info
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_use_sysctl_gather_macos_hardware_info() {\n    local result\n    result=$(sysctl -n hw.model 2>&1)\n  \
      \  $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
