procedure_name: last
tactic: Discovery
ttp_id: T9999
guid: $GUID
intent: Show last user logins and TTYs.
author: '@darmado | https://x.com/darmad0'
credit: 'LOOBins catalog author: Will Huang (@In0de_16)'
created: '2023-04-27'
updated: $UPDATED
version: 1.0.0
platform:
- darwin
detection:
- ioc: System Network Connections Discovery
  analysis: https://github.com/SigmaHQ/sigma/blob/master/rules/macos/process_creation/proc_creation_macos_system_network_connections_discovery.yml
resources:
- link: https://www.loobins.io/
  description: LOOBins — Living Off The Orchard macOS binaries
- link: ''
  description: ''
- link: https://ss64.com/osx/last.html
  description: last Man Page
acknowledgement:
- person: ''
  handle: ''
procedure:
  arguments:
  - option: --enumerate-the-users-who-are-currently-logged-into-the-system
    description: The following command will display sessions that are currently active.
    execute_function:
    - execute_enumerate_users_who_are_currently_logged_into_system
  - option: --enumerate-all-user-accounts-that-have-logged-into-the-system-previousl
    description: The last command can be used to output users who have previously logged in, by specifying the tty in
    execute_function:
    - execute_enumerate_all_user_accounts_that_have_logged_into_system_previously
  - option: --enumerate-all-hosts-that-have-remotely-logged-into-the-system-before
    description: An attacker can use 'last' with a filter to retrieve the connection date and remote host information
    execute_function:
    - execute_enumerate_all_hosts_that_have_remotely_logged_into_system_before
  global_variable:
  - name: CMD_LAST
    type: string
    default_value: /usr/bin/last
  functions:
  - name: execute_enumerate_users_who_are_currently_logged_into_system
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_enumerate_users_who_are_currently_logged_into_system() {\n    local result\n    result=$(last | grep \"\
      still logged in\" 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
  - name: execute_enumerate_all_user_accounts_that_have_logged_into_system_previously
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_enumerate_all_user_accounts_that_have_logged_into_system_previously() {\n    local result\n    result=$(last\
      \ -t console 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
  - name: execute_enumerate_all_hosts_that_have_remotely_logged_into_system_before
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_enumerate_all_hosts_that_have_remotely_logged_into_system_before() {\n    local result\n    result=$(last\
      \ | grep -E '[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+' 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
