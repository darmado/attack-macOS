procedure_name: dsexport
tactic: Reconnaissance
ttp_id: T9999
guid: $GUID
intent: Export data from an Open Directory directory services server.
author: '@darmado | https://x.com/darmad0'
credit: 'LOOBins catalog author: Brendan Chamberlain (@infosecB)'
created: '2023-05-23'
updated: $UPDATED
version: 1.0.0
platform:
- darwin
detection: []
resources:
- link: https://www.loobins.io/
  description: LOOBins — Living Off The Orchard macOS binaries
- link: ''
  description: ''
acknowledgement:
- person: ''
  handle: ''
procedure:
  arguments:
  - option: --export-local-host-users
    description: Export the local host user information to a file
    execute_function:
    - execute_export_local_host_users
  - option: --export-local-host-groups
    description: Export the local host group information to a file
    execute_function:
    - execute_export_local_host_groups
  global_variable:
  - name: CMD_DSEXPORT
    type: string
    default_value: /usr/bin/dsexport
  functions:
  - name: execute_export_local_host_users
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_export_local_host_users() {\n    local result\n    result=$(dsexport local_users.txt /Local/Default dsRecTypeStandard:Users\
      \ 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
  - name: execute_export_local_host_groups
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_export_local_host_groups() {\n    local result\n    result=$(dsexport local_groups.txt /Local/Default dsRecTypeStandard:Groups\
      \ 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
