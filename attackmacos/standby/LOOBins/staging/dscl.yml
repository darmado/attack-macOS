procedure:
  arguments:
  - option: --local-user-enumeration
    description: Enumerate all local users.
    execute_function:
    - execute_local_user_enumeration
  - option: --active-directory-user-enumeration
    description: Enumerate all Active Directory users.
    execute_function:
    - execute_active_directory_user_enumeration
  - option: --local-user-information-gathering
    description: 'Gain useful local user information such as when their password was last set, their keyboard layout, '
    execute_function:
    - execute_local_user_information_gathering
  - option: --active-directory-user-information-gathering
    description: Gain useful Active Directory user information such as when their password was last set, their keyboa
    execute_function:
    - execute_active_directory_user_information_gathering
  - option: --local-group-enumeration
    description: Enumerate all local groups.
    execute_function:
    - execute_local_group_enumeration
  - option: --active-directory-group-enumeration
    description: Enumerate all Active Directory groups.
    execute_function:
    - execute_active_directory_group_enumeration
  - option: --local-group-information-gathering
    description: Gain useful local group information such as which users belong to that group, SMB SIDs and group ID.
    execute_function:
    - execute_local_group_information_gathering
  - option: --active-directory-group-information-gathering
    description: Gain useful Active Directory group information such as which users belong to that group, SMB SIDs an
    execute_function:
    - execute_active_directory_group_information_gathering
  - option: --computer-enumration
    description: Enumerate all computers in an Active Directory.
    execute_function:
    - execute_computer_enumration
  - option: --share-enumration
    description: Enumerate all shares.
    execute_function:
    - execute_share_enumration
  - option: --password-policy-discovery
    description: Gain password policy information
    execute_function:
    - execute_password_policy_discovery
  - option: --change-a-user-password
    description: Change an existing user's password.
    execute_function:
    - execute_change_user_password
  - option: --local-account-creation
    description: Create a local account
    execute_function:
    - execute_local_account_creation
  global_variable:
  - name: CMD_DSCL
    type: string
    default_value: /usr/bin/dscl
  functions:
  - name: execute_local_user_enumeration
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_local_user_enumeration() {\n    local result\n    result=$(dscl . -list /Users\ndscl . list /Users\ndscl\
      \ . ls /Users\n 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
  - name: execute_active_directory_user_enumeration
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_active_directory_user_enumeration() {\n    local result\n    result=$(dscl \"/Active Directory/TEST/All\
      \ Domains\" -list /Users\ndscl \"/Active Directory/TEST/All Domains\" list /Users\ndscl \"/Active Directory/TEST/All\
      \ Domains\" ls /Users\n 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
  - name: execute_local_user_information_gathering
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_local_user_information_gathering() {\n    local result\n    result=$(dscl . -read /Users/$USERNAME\ndscl\
      \ . read /Users/$USERNAME\ndscl . cat /Users/$USERNAME\n 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return\
      \ 0\n}"
  - name: execute_active_directory_user_information_gathering
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_active_directory_user_information_gathering() {\n    local result\n    result=$(dscl \"/Active Directory/TEST/All\
      \ Domains\" -read /Users/$USERNAME\ndscl \"/Active Directory/TEST/All Domains\" read /Users/$USERNAME\ndscl \"/Active\
      \ Directory/TEST/All Domains\" cat /Users/$USERNAME\n 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return\
      \ 0\n}"
  - name: execute_local_group_enumeration
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
