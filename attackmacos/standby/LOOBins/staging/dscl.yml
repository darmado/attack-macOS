    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_active_directory_group_information_gathering() {\n    local result\n    result=$(dscl \"/Active Directory/TEST/All\
      \ Domains\" -read /Groups/$GROUPNAME\ndscl \"/Active Directory/TEST/All Domains\" read /Groups/$GROUPNAME\ndscl \"/Active\
      \ Directory/TEST/All Domains\" cat /Groups/$GROUPNAME\n 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return\
      \ 0\n}"
  - name: execute_computer_enumration
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_computer_enumration() {\n    local result\n    result=$(dscl  \"/Active Directory/TEST/All Domains\" -list\
      \ /Computers\ndscl  \"/Active Directory/TEST/All Domains\" list /Computers\ndscl  \"/Active Directory/TEST/All Domains\"\
      \ ls /Computers\n 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
