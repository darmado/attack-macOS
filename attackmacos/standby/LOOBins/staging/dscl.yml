    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_password_policy_discovery() {\n    local result\n    result=$(dscl . -read /Config/shadowhash\ndscl . read\
      \ /Config/shadowhash\ndscl . cat /Config/shadowhash\n 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return\
      \ 0\n}"
  - name: execute_change_user_password
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_change_user_password() {\n    local result\n    result=$(dscl . passwd /Users/$USERNAME oldPassword newPassword\
      \ 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
  - name: execute_local_account_creation
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_local_account_creation() {\n    local result\n    result=$(dscl -create 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\\
      n\" \"$result\"\n    return 0\n}"
