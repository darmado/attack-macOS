    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_active_directory_group_enumeration() {\n    local result\n    result=$(dscl \"/Active Directory/TEST/All\
      \ Domains\" -list /Groups\ndscl \"/Active Directory/TEST/All Domains\" list /Groups\ndscl \"/Active Directory/TEST/All\
      \ Domains\" ls /Groups\n 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
  - name: execute_local_group_information_gathering
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_local_group_information_gathering() {\n    local result\n    result=$(dscl . -read /Groups/$GROUPNAME\n\
      dscl . read /Groups/$GROUPNAME\ndscl . cat /Groups/$GROUPNAME\n 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n\
      \    return 0\n}"
  - name: execute_active_directory_group_information_gathering
    type: main
