procedure:
  arguments:
  - option: --list-kernel-extensions
    description: Uses kexstat showloaded to display kernel extensions and address in kernel memory it has been loaded
    execute_function:
    - execute_list_kernel_extensions
  global_variable:
  - name: CMD_KEXTSTAT
    type: string
    default_value: /usr/sbin/kextstat
  functions:
  - name: execute_list_kernel_extensions
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_list_kernel_extensions() {\n    local result\n    result=$(kexstat 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\\
      n\" \"$result\"\n    return 0\n}"
