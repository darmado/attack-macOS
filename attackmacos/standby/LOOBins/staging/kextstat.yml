procedure_name: kextstat
tactic: Discovery
ttp_id: T9999
guid: $GUID
intent: Display the status of loaded kernal extensions (kexts)
author: '@darmado | https://x.com/darmad0'
credit: 'LOOBins catalog author: Mark Morowczynsk (@markmorow)'
created: '2023-07-30'
updated: $UPDATED
