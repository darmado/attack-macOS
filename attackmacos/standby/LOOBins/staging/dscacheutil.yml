procedure_name: dscacheutil
tactic: Discovery
ttp_id: T9999
guid: $GUID
intent: gather information, statistics and initiate queries to the Directory Service cache.
author: '@darmado | https://x.com/darmad0'
credit: 'LOOBins catalog author: Ethan Nay'
created: '2023-08-23'
updated: $UPDATED
version: 1.0.0
platform:
- darwin
detection: []
resources:
- link: https://www.loobins.io/
  description: LOOBins — Living Off The Orchard macOS binaries
- link: ''
  description: ''
- link: https://macosbin.com/bin/dscacheutil
  description: macOS/binaries/dscacheutil
- link: https://ss64.com/osx/dscacheutil.html
  description: dscacheutil man page
acknowledgement:
- person: ''
  handle: ''
procedure:
  arguments:
  - option: --lookup-a-user
    description: List the user information
    execute_function:
    - execute_lookup_user
  - option: --lookup-all-users
    description: List the all users information
    execute_function:
    - execute_lookup_all_users
  global_variable:
  - name: CMD_DSCACHEUTIL
    type: string
    default_value: /usr/bin/dscacheutil
  functions:
  - name: execute_lookup_user
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_lookup_user() {\n    local result\n    result=$(dscacheutil -q user -a name <USER_NAME> 2>&1)\n    $CMD_PRINTF\
      \ \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
  - name: execute_lookup_all_users
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_lookup_all_users() {\n    local result\n    result=$(dscacheutil -q user 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\\
      n\" \"$result\"\n    return 0\n}"
