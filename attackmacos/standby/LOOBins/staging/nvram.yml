        exit_on_failure: true
    code: "execute_get_nvram_variables() {\n    local result\n    result=$(nvram -p 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\"\
      \ \"$result\"\n    return 0\n}"
