procedure:
  arguments:
  - option: --execute-swift-code-file
    description: Executes the Swift code that is in a .swift file
    execute_function:
    - execute_execute_swift_code_file
  - option: --execute-swift-one-liner-before-swift-5-8-xcode-14-3-beta-1
    description: Executes a Swift one-liner by piping an echoed string into the swift command
    execute_function:
    - execute_execute_swift_one_liner_before_swift_5_8_xcode_14_3_beta_1
  - option: --execute-swift-one-liner-with-swift-5-8-xcode-14-3-beta-1-or-greater
    description: Executes a Swift one-liner that executes the ls command to list the current directory using the -e o
    execute_function:
    - execute_execute_swift_one_liner_swift_5_8_xcode_14_3_beta_1_greater
  global_variable:
  - name: CMD_SWIFT
    type: string
    default_value: /usr/bin/swift
  functions:
  - name: execute_execute_swift_code_file
    type: main
    language:
    - swift
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_execute_swift_code_file() {\n    local result\n    result=$(swift mycode.swift 2>&1)\n    $CMD_PRINTF \"\
      RESULT|%s\\n\" \"$result\"\n    return 0\n}"
  - name: execute_execute_swift_one_liner_before_swift_5_8_xcode_14_3_beta_1
    type: main
    language:
    - swift
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_execute_swift_one_liner_before_swift_5_8_xcode_14_3_beta_1() {\n    local result\n    result=$(echo 'print(\"\
      loobins\")' | swift - 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
  - name: execute_execute_swift_one_liner_swift_5_8_xcode_14_3_beta_1_greater
    type: main
    language:
    - swift
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_execute_swift_one_liner_swift_5_8_xcode_14_3_beta_1_greater() {\n    local result\n    result=$(swift -e\
      \ 'import Foundation; let process = Process(); process.executableURL = URL(fileURLWithPath:\"/bin/bash\"); process.arguments\
      \ = [\"-c\", \"ls -alh\"]; let stdout = Pipe(); let stderr = Pipe(); process.standardOutput = stdout; process.standardError\
      \ = stderr; try process.run(); print(String(decoding: stdout.fileHandleForReading.readDataToEndOfFile(), as: UTF8.self));\
      \ print(String(decoding: stderr.fileHandleForReading.readDataToEndOfFile(), as: UTF8.self));' 2>&1)\n    $CMD_PRINTF\
      \ \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
