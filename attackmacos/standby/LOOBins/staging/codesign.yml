procedure:
  arguments:
  - option: --ad-hod-codesigning-an-app-bundle
    description: This command forcefully re-signs the MyApp.app application with an ad-hoc signature, applying the si
    execute_function:
    - execute_ad_hod_codesigning_app_bundle
  global_variable:
  - name: CMD_CODESIGN
    type: string
    default_value: /usr/bin/codesign
  functions:
  - name: execute_ad_hod_codesigning_app_bundle
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_ad_hod_codesigning_app_bundle() {\n    local result\n    result=$(codesign --force --deep -s - MyApp.app\
      \ 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
