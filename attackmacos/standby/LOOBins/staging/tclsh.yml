procedure_name: tclsh
tactic: Execution
ttp_id: T9999
guid: $GUID
intent: Run Tcl files or shell commands from standard input.
author: '@darmado | https://x.com/darmad0'
credit: 'LOOBins catalog author: Brendan Chamberlain (@infosecB)'
created: '2023-05-17'
updated: $UPDATED
