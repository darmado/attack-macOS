  description: Dylib Loads that Tickle your Fancy
acknowledgement:
- person: Leo Pitt (@_D00mfist)
  handle: ''
procedure:
  arguments:
  - option: --execute-malicious-dynamic-library-dylib-from-standard-input
    description: An attacker can execute a malicious .dylib from stdin by echoing a load command and piping to tclsh.
    execute_function:
    - execute_execute_malicious_dynamic_library_dylib_from_standard_input
  global_variable:
  - name: CMD_TCLSH
    type: string
    default_value: /usr/bin/tclsh
  functions:
  - name: execute_execute_malicious_dynamic_library_dylib_from_standard_input
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_execute_malicious_dynamic_library_dylib_from_standard_input() {\n    local result\n    result=$(echo \"\
      load bad.dylib\" | tclsh 2>&1)\n    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
