  description: 'Living-off-the-Land: Exploring macOS LOOBins and Crafting Detection Rules - nscurl'
acknowledgement:
- person: ''
  handle: ''
procedure:
  arguments:
  - option: --download-file
    description: Download file and ignore cert checking
    execute_function:
    - execute_download_file
  - option: --download-file
    description: Download file to the Downloads directory using -dl
    execute_function:
    - execute_download_file
  - option: --download-file
    description: Download file to a designated directory using -dir
    execute_function:
    - execute_download_file
  global_variable:
  - name: CMD_NSCURL
    type: string
    default_value: /usr/bin/nscurl
  functions:
  - name: execute_download_file
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_download_file() {\n    local result\n    result=$(nscurl -k https://google.com -o /private/tmp/google 2>&1)\n\
      \    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
  - name: execute_download_file
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_download_file() {\n    local result\n    result=$(nscurl https://google.com -dl 2>&1)\n    $CMD_PRINTF\
      \ \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
  - name: execute_download_file
    type: main
    language:
    - shell
    opsec:
      check_fda:
        enabled: false
        exit_on_failure: true
    code: "execute_download_file() {\n    local result\n    result=$(nscurl https://google.com -dir /private/tmp/google 2>&1)\n\
      \    $CMD_PRINTF \"RESULT|%s\\n\" \"$result\"\n    return 0\n}"
